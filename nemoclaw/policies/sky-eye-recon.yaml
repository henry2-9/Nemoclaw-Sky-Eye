# Sky Eye Recon — sandbox 即時情報爬蟲白名單。Hermes 在 OpenShell sandbox 內
# 針對嚴重事件主動爬 sub-hourly 即時來源做交叉驗證(政府氣象警報、即時地震、
# 即時航班、城市即時討論、即時 HN 討論)。維持 read-only GET-only 邊界。
# 故意排除 Wikipedia(靜態)、worldtimeapi(無情報價值)、nominatim(位置查詢)。
preset:
  name: sky-eye-recon
  description: "Sky Eye 即時情報(weather.gov 氣象警報 / USGS 地震 / OpenSky 航班 / HN 即時討論)"

network_policies:
  sky-eye-recon:
    name: sky-eye-recon
    endpoints:
      - host: api.weather.gov
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
      - host: earthquake.usgs.gov
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
      - host: opensky-network.org
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
      - host: hn.algolia.com
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
    binaries:
      - { path: /usr/bin/curl }
      - { path: /usr/bin/wget }
