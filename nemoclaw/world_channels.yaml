# 世界公開政府路口/道路直播攝影機。
# 三大來源:
#   1) 台灣高公局 CCTV(MJPEG,公開無 key)
#   2) 英國 TfL JamCam(政府開放資料 API,每幾秒更新 JPEG snapshot)
#   3) 日本/歐洲其他國家 → 由 agent 自主 yt-dlp 探索找 24/7 公開 live(寫入 discovered_traffic.yaml)
# 資源節省:每週期每路只抓「1 幀」即關閉連線,不連續解碼。
# agent 自主探索會把路口/道路 live cam 寫入 discovered_traffic.yaml;啟用 discovery 時自動合併。
# 啟用方式:export NEMOCLAW_CHANNELS_FILE=$NEMOCLAW_DIR/world_channels.yaml
channels:
